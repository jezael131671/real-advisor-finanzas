<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <rect width="512" height="256" rx="110" fill="url(#shine)"/>
  <!-- Dollar sign -->
  <text x="256" y="345" font-family="Arial Black, Helvetica, sans-serif"
        font-size="290" font-weight="900" fill="white"
        text-anchor="middle" opacity="0.95">$</text>
  <!-- Small accent bar -->
  <rect x="180" y="380" width="152" height="8" rx="4" fill="white" opacity="0.3"/>
</svg>
